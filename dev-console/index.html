<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grace 3.1 Ops Console</title>
<style>
:root {
  --bg:#0a0b14;--bg-alt:#111420;--bg-panel:#0d0e18;--bg-input:#0c0d16;
  --green:#2ecc71;--red:#e74c3c;--yellow:#f1c40f;--blue:#3498db;
  --purple:#8e44ad;--orange:#e67e22;--accent:#e94560;
  --text:#fff;--muted:#636e72;--dim:#3d4450;--border:#1a1d2e;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
button{font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px;}

/* HEADER */
#header{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--border);background:var(--bg-panel);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;}
.logo .title{font-size:15px;font-weight:800;}
.logo .sub{font-size:11px;color:var(--muted);}
#status-pill{padding:3px 12px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:1px;}
.pill-on{background:rgba(46,204,113,0.15);color:var(--green);border:1px solid rgba(46,204,113,0.25);}
.pill-off{background:rgba(231,76,60,0.15);color:var(--red);border:1px solid rgba(231,76,60,0.25);}

/* BODY */
#body{flex:1;display:flex;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:172px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--bg-panel);flex-shrink:0;overflow-y:auto;}
.sec-lbl{padding:10px 12px 4px;font-size:8px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
.svc-list{padding:0 8px 10px;display:flex;flex-direction:column;gap:5px;}
.svc-row{display:flex;align-items:center;justify-content:space-between;padding:5px 7px;border-radius:5px;background:var(--bg-alt);}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.svc-name{font-size:11px;font-weight:600;margin-left:6px;}
.svc-pill{font-size:8px;font-weight:700;padding:1px 5px;border-radius:6px;}
.ctrl-list{padding:0 8px 10px;display:flex;flex-direction:column;gap:3px;}
.ctrl-btn{width:100%;padding:6px 8px;border:none;border-radius:5px;font-size:10px;font-weight:600;text-align:left;color:var(--text);}
.ctrl-btn:hover{filter:brightness(1.2);}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0;}
#tab-bar{display:flex;align-items:center;border-bottom:1px solid var(--border);background:var(--bg-panel);overflow-x:auto;flex-shrink:0;}
.tab-btn{display:flex;align-items:center;gap:5px;padding:9px 14px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;}
.tab-btn.active{color:var(--blue);font-weight:700;border-bottom-color:var(--blue);}
.badge{min-width:16px;height:16px;border-radius:8px;background:var(--red);color:#fff;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;padding:0 4px;}
#tab-content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.pane{display:none;flex:1;overflow:hidden;flex-direction:column;}
.pane.active{display:flex;}

/* BOTTOM BAR */
#bottom-bar{border-top:1px solid var(--border);background:var(--bg-panel);flex-shrink:0;transition:height 0.2s;overflow:hidden;}
#bottom-tabs{height:32px;display:flex;align-items:center;padding:0 10px;gap:4px;flex-shrink:0;}
.bt-btn{padding:3px 10px;border:none;background:transparent;color:var(--muted);font-size:10px;font-weight:700;border-bottom:2px solid transparent;font-family:inherit;}
.bt-btn.active{color:var(--blue);border-bottom-color:var(--blue);}
#bottom-content{flex:1;overflow:auto;padding:6px 14px;font-family:'JetBrains Mono','Fira Code',monospace;font-size:11px;line-height:1.4;}
#bottom-input-row{display:none;padding:5px 10px;border-top:1px solid var(--border);gap:6px;align-items:center;}
#bottom-input-row.show{display:flex;}
#bottom-input{flex:1;padding:5px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;outline:none;font-family:inherit;}
#bottom-send{padding:3px 12px;background:var(--blue);border:none;border-radius:4px;color:#fff;font-size:10px;font-weight:700;}

/* SHARED */
.card{background:var(--bg-alt);border:1px solid var(--border);border-radius:7px;padding:12px;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.mono{font-family:'JetBrains Mono','Fira Code',monospace;}
.log-e{color:var(--red)}.log-w{color:var(--yellow)}.log-ok{color:var(--green)}.log-i{color:var(--blue)}.log-d{color:#aaa;}
.empty{padding:30px;text-align:center;color:var(--muted);background:var(--bg-alt);border-radius:7px;border:1px solid var(--border);}
.toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;background:var(--bg-panel);}
.toolbar select,.toolbar input[type=text]{background:var(--bg-input);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:10px;outline:none;font-family:inherit;}
.toolbar input[type=text]{min-width:160px;}
.btn-sm{padding:4px 10px;border:none;border-radius:4px;font-size:10px;font-weight:700;color:#fff;}
.btn-sm:hover{filter:brightness(1.15);}
.confirm-bar{display:none;padding:8px 12px;background:rgba(233,69,96,0.15);border-bottom:1px solid var(--accent);align-items:center;gap:8px;font-size:11px;flex-shrink:0;}
.confirm-bar.show{display:flex;}

/* PROBLEMS */
.alert-row{padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:flex-start;gap:8px;transition:background 0.1s;}
.alert-row:hover{background:rgba(52,152,219,0.06);}
.alert-row.selected{background:rgba(52,152,219,0.1);border-left:3px solid var(--blue);}
.sev-badge{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:700;text-transform:uppercase;flex-shrink:0;}
.src-badge{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;}
.alert-detail{padding:16px;overflow-y:auto;border-left:1px solid var(--border);background:var(--bg-panel);}
.fix-btn{padding:3px 8px;border:none;border-radius:3px;font-size:9px;font-weight:700;color:#fff;background:var(--green);flex-shrink:0;}
.fix-btn:hover{filter:brightness(1.2);}
.fix-btn.danger{background:var(--accent);}

/* AUDIT */
.timeline-entry{display:flex;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;}
.timeline-entry .ts{color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:10px;flex-shrink:0;width:70px;}
.timeline-entry .dot-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:20px;}
.timeline-entry .evt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.timeline-entry .body{flex:1;min-width:0;}
.timeline-entry .evt-type{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;text-transform:uppercase;}

/* TESTING */
.test-console{flex:1;overflow:auto;background:#000;padding:10px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.5;white-space:pre-wrap;}
.suite-card{padding:10px;background:var(--bg-alt);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.suite-card:hover{border-color:var(--blue);}
.sub-tabs{display:flex;gap:2px;padding:6px 12px;border-bottom:1px solid var(--border);background:var(--bg-panel);flex-shrink:0;}
.sub-tab{padding:5px 12px;border:none;background:transparent;color:var(--muted);font-size:11px;font-weight:600;border-bottom:2px solid transparent;font-family:inherit;}
.sub-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
</style>
</head>
<body>

<div id="header">
  <div class="logo"><span style="font-size:16px">⚡</span><span class="title">Grace 3.1</span><span class="sub">Ops Console</span></div>
  <div id="status-pill" class="pill-off">CHECKING…</div>
</div>

<div id="body">
  <div id="sidebar">
    <div class="sec-lbl">System Health</div>
    <div class="svc-list" id="svc-list"></div>
    <div class="sec-lbl">Controls</div>
    <div class="ctrl-list" id="ctrl-list"></div>
  </div>
  <div id="main">
    <div id="tab-bar"></div>
    <div id="tab-content"></div>
  </div>
</div>

<div id="bottom-bar" style="height:32px">
  <div id="bottom-tabs">
    <button class="bt-btn active" data-bt="feed">📡 LIVE FEED</button>
    <button class="bt-btn" data-bt="chat">💬 CHAT</button>
    <button class="bt-btn" data-bt="shell">>_ SHELL</button>
    <div style="flex:1"></div>
    <button id="bottom-toggle" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px">▲</button>
  </div>
  <div id="bottom-content"></div>
  <div id="bottom-input-row">
    <span id="bottom-prompt" style="color:var(--muted);font-size:12px">💬</span>
    <input id="bottom-input" placeholder="Talk to Grace…" />
    <button id="bottom-send">→</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
const API='http://localhost:8000';
const WS_BASE=API.replace(/^http/,'ws');

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
const S={
  health:{},graceRunning:false,problemCount:0,activeTab:'problems',
  // Problems
  report:null,alerts:[],filteredAlerts:[],selectedIds:new Set(),activeAlert:null,
  pSearch:'',pSev:'all',pSrc:'all',pCat:'all',pHealable:false,
  // Audit
  auditEntries:[],auditLoading:false,auditSubTab:'timeline',auditLiveLogs:[],auditLiveConnected:false,localLedger:JSON.parse(localStorage.getItem('ops_ledger')||'[]'),
  // Testing
  testSuites:[],testActiveRun:null,testStreamLines:[],testHistory:[],testSubTab:'run',
  // Bottom
  bottomTab:'feed',bottomExpanded:false,feedLogs:[],bottomMessages:[],
  // Boot
  bootLogs:[],
  // Spindle
  spindleData:null,spindleEvents:[],
  // Autonomous Loop
  ouroboros:null,
  // Component Health
  componentMap:null,
  // Self-Mirror
  mirrorSnapshot:null,
  // BI
  biData:null,
  // KPI
  kpiData:null,
  // Monitoring
  organs:null,
  // World Model
  worldState:null,
  // Probe
  probeResult:null,
  // Introspection
  introValidation:null,
  // Stress
  stressStatus:null,
};

function saveLedger(){localStorage.setItem('ops_ledger',JSON.stringify(S.localLedger.slice(-500)));}
function addLedger(type,title,detail,outcome){
  const e={id:Date.now(),ts:new Date().toISOString(),type,title,detail:detail||'',outcome:outcome||'pending',source:'operator'};
  S.localLedger.push(e);saveLedger();return e;
}
function updateLedger(id,outcome,detail){
  const e=S.localLedger.find(x=>x.id===id);
  if(e){e.outcome=outcome;if(detail)e.detail=detail;saveLedger();}
}

// ══════════════════════════════════════════════════════════════
// API HELPERS
// ══════════════════════════════════════════════════════════════
async function GET(p){try{const r=await fetch(API+p);return r.ok?await r.json():null;}catch{return null;}}
async function POST(p,b){try{const r=await fetch(API+p,{method:'POST',headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined});return r.ok?await r.json():null;}catch{return null;}}

const sevColor={critical:'#f44336',warning:'#ff9800',info:'#2196f3'};
const sevIcon={critical:'🔴',warning:'🟡',info:'🔵'};
const srcColor={blackbox:'#9c27b0',component_health:'#ff5722',diagnostic:'#2196f3',validation:'#ff9800',cognitive:'#e91e63'};
const srcLabel={blackbox:'Scanner',component_health:'Components',diagnostic:'Diagnostic',validation:'Trust/KPI',cognitive:'Cognitive'};
const evtColors={problem_detected:'#f44336',heal_requested:'#e67e22',heal_completed:'#2ecc71',heal_failed:'#e74c3c',verification_passed:'#2ecc71',verification_failed:'#f44336',cognitive_event:'#e91e63',genesis_record:'#f1c40f',test_run:'#3498db',test_result:'#8e44ad',operator_action:'#636e72'};

// ══════════════════════════════════════════════════════════════
// SERVICES & SIDEBAR
// ══════════════════════════════════════════════════════════════
const SVCS=[{key:'database',name:'PostgreSQL'},{key:'qdrant',name:'Qdrant'},{key:'ollama',name:'Ollama'},{key:'grace_api',name:'Grace API'},{key:'frontend',name:'Frontend'}];
const CTRLS=[
  {l:'⚡ Launch Grace',bg:'#8e44ad',fn:()=>POST('/api/admin/start')},
  {l:'■ Stop Grace',bg:'#111420',c:'#e74c3c',fn:()=>POST('/api/admin/stop')},
  {l:'🩺 Spindle Healer',bg:'#e94560',fn:()=>POST('/api/immune/scan')},
  {l:'🔄 Restart',bg:'#e67e22',fn:()=>POST('/api/admin/restart')},
  {l:'🌐 Frontend',bg:'#111420',c:'#3498db',fn:()=>window.open('http://localhost:5173','_blank')},
  {l:'📄 API Docs',bg:'#111420',fn:()=>window.open(API+'/docs','_blank')},
  {l:'🔍 Diagnostics',bg:'#111420',fn:()=>GET('/api/diagnostic/forensics')},
];

function renderSidebar(){
  const list=document.getElementById('svc-list');list.innerHTML='';
  SVCS.forEach(s=>{const on=S.health[s.key];
    list.innerHTML+=`<div class="svc-row"><div style="display:flex;align-items:center"><div class="dot" style="background:${on?'#2ecc71':'#e74c3c'}"></div><span class="svc-name">${s.name}</span></div><span class="svc-pill" style="background:${on?'rgba(46,204,113,.12)':'rgba(231,76,60,.12)'};color:${on?'#2ecc71':'#e74c3c'}">${on?'ON':'OFF'}</span></div>`;
  });
  const pill=document.getElementById('status-pill');
  pill.textContent=S.graceRunning?'RUNNING':'STOPPED';
  pill.className=S.graceRunning?'pill-on':'pill-off';
}
function buildControls(){
  const list=document.getElementById('ctrl-list');
  CTRLS.forEach(c=>{const b=document.createElement('button');b.className='ctrl-btn';b.style.background=c.bg||'#111420';b.style.color=c.c||'#fff';b.textContent=c.l;b.onclick=c.fn;list.appendChild(b);});
}

// ══════════════════════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════════════════════
const TABS=[
  {id:'problems',label:'Problems',icon:'⚠️',badge:true},
  {id:'audit',label:'Audit Trail',icon:'📋'},
  {id:'testing',label:'Testing',icon:'🧪'},
  {id:'bootlog',label:'Boot Log',icon:'📜'},
  {id:'metrics',label:'Metrics',icon:'📊'},
  {id:'healing',label:'Self-Healing',icon:'🔧'},
  {id:'memory',label:'Memory',icon:'🧠'},
  {id:'trust',label:'Trust',icon:'🤖'},
  {id:'diagnostics',label:'Diagnostics',icon:'🔬'},
  {id:'network',label:'Network',icon:'🌐'},
  {id:'genesis',label:'Genesis Keys',icon:'🔑'},
  {id:'federated',label:'Federated',icon:'🌍'},
];

function buildTabs(){
  const bar=document.getElementById('tab-bar'),content=document.getElementById('tab-content');
  bar.innerHTML='';content.innerHTML='';
  TABS.forEach(t=>{
    const btn=document.createElement('button');btn.className='tab-btn'+(S.activeTab===t.id?' active':'');btn.dataset.tab=t.id;
    btn.innerHTML=`<span style="font-size:13px">${t.icon}</span>${t.label}`;
    if(t.badge&&S.problemCount>0)btn.innerHTML+=` <span class="badge">${S.problemCount}</span>`;
    btn.onclick=()=>switchTab(t.id);bar.appendChild(btn);
    const pane=document.createElement('div');pane.className='pane'+(S.activeTab===t.id?' active':'');pane.id='pane-'+t.id;content.appendChild(pane);
  });
}
function switchTab(id){
  S.activeTab=id;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('active',p.id==='pane-'+id));
  renderTab();
}
function updateBadge(){
  const btn=document.querySelector('.tab-btn[data-tab="problems"]');if(!btn)return;
  const b=btn.querySelector('.badge');if(b)b.remove();
  if(S.problemCount>0){const sp=document.createElement('span');sp.className='badge';sp.textContent=S.problemCount;btn.appendChild(sp);}
}

// ══════════════════════════════════════════════════════════════
// RENDER DISPATCHER
// ══════════════════════════════════════════════════════════════
function renderTab(){
  const p=document.getElementById('pane-'+S.activeTab);if(!p)return;
  const renderers={problems:renderProblems,audit:renderAudit,testing:renderTesting,bootlog:renderBootLog,metrics:renderMetrics,healing:renderHealing,memory:renderMemory,trust:renderTrust,diagnostics:renderDiagnostics,network:renderNetwork,genesis:renderGenesis,federated:renderFederated};
  (renderers[S.activeTab]||renderEmpty)(p);
}
function renderEmpty(p){p.innerHTML='<div class="empty" style="margin:20px">Coming soon</div>';}

// ══════════════════════════════════════════════════════════════
// PROBLEMS TAB — Command Center
// ══════════════════════════════════════════════════════════════
function filterAlerts(){
  let a=S.alerts||[];
  if(S.pSearch){const q=S.pSearch.toLowerCase();a=a.filter(x=>(x.title+' '+x.description+' '+(x.component||'')+' '+(x.category||'')).toLowerCase().includes(q));}
  if(S.pSev!=='all')a=a.filter(x=>x.severity===S.pSev);
  if(S.pSrc!=='all')a=a.filter(x=>x.source===S.pSrc);
  if(S.pCat!=='all')a=a.filter(x=>x.category===S.pCat);
  if(S.pHealable)a=a.filter(x=>x.auto_healable);
  S.filteredAlerts=a;
}

async function loadProblems(){
  const d=await GET('/api/problems/unified');
  if(!d?.ok||!d.report)return;
  S.report=d.report;S.alerts=d.report.alerts||[];
  S.problemCount=(d.report.critical_count||0)+(d.report.warning_count||0);
  filterAlerts();updateBadge();
  if(S.activeTab==='problems')renderProblems(document.getElementById('pane-problems'));
}

async function fixAlert(alert){
  const ledgerId=addLedger('heal_requested','Fix: '+alert.title,alert.component||alert.source).id;
  const target=alert.component||alert.title;
  const r=await POST('/api/healing-swarm/submit',{title:alert.title,severity:alert.severity,component:alert.component||'unknown',description:alert.description||alert.title});
  updateLedger(ledgerId,r?'completed':'failed',r?JSON.stringify(r).slice(0,200):'Request failed');
  await loadProblems();if(S.activeTab==='problems')renderProblems(document.getElementById('pane-problems'));
}

async function fixAllConsensus(){
  if(!confirm('Run Consensus Fix All? This will scan and auto-fix everything.'))return;
  const ledgerId=addLedger('heal_requested','Consensus Fix All','Batch').id;
  const r=await POST('/api/consensus-fix/fix-all');
  updateLedger(ledgerId,r?'completed':'failed');
  await loadProblems();
}
async function swarmHealAll(){
  if(!confirm('Dispatch Swarm Heal All?'))return;
  const ledgerId=addLedger('heal_requested','Swarm Heal All','Batch').id;
  const r=await POST('/api/healing-swarm/heal-all');
  updateLedger(ledgerId,r?'completed':'failed');
  await loadProblems();
}
async function scanAndHeal(){
  if(!confirm('Run Scan + Auto-Heal pipeline?'))return;
  const ledgerId=addLedger('heal_requested','Scan & Heal','Triggers pipeline').id;
  const r=await POST('/api/triggers/scan-and-heal');
  updateLedger(ledgerId,r?'completed':'failed');
  await loadProblems();
}

function renderProblems(p){
  filterAlerts();
  const r=S.report;
  const cats=[...new Set(S.alerts.map(a=>a.category))].sort();
  const sources=[...new Set(S.alerts.map(a=>a.source))].sort();

  let html=`
  <div class="toolbar">
    <input type="text" placeholder="🔍 Search alerts…" value="${S.pSearch}" oninput="S.pSearch=this.value;renderProblems(this.closest('.pane'))">
    <select onchange="S.pSev=this.value;renderProblems(this.closest('.pane'))">
      <option value="all"${S.pSev==='all'?' selected':''}>All Severity</option>
      <option value="critical"${S.pSev==='critical'?' selected':''}>Critical</option>
      <option value="warning"${S.pSev==='warning'?' selected':''}>Warning</option>
      <option value="info"${S.pSev==='info'?' selected':''}>Info</option>
    </select>
    <select onchange="S.pSrc=this.value;renderProblems(this.closest('.pane'))">
      <option value="all">All Sources</option>
      ${sources.map(s=>`<option value="${s}"${S.pSrc===s?' selected':''}>${srcLabel[s]||s}</option>`).join('')}
    </select>
    <select onchange="S.pCat=this.value;renderProblems(this.closest('.pane'))">
      <option value="all">All Categories</option>
      ${cats.map(c=>`<option value="${c}"${S.pCat===c?' selected':''}>${c.replace(/_/g,' ')}</option>`).join('')}
    </select>
    <label style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);cursor:pointer"><input type="checkbox" ${S.pHealable?'checked':''} onchange="S.pHealable=this.checked;renderProblems(this.closest('.pane'))">Fixable only</label>
    <div style="flex:1"></div>
    <button class="btn-sm" style="background:var(--purple)" onclick="POST('/api/problems/scan').then(()=>loadProblems())">🔍 Scan</button>

async function loadAudit(){
  S.auditLoading=true;
  const entries=[];
  // Fetch from all history sources in parallel
  const [autoLog,verifications,healHistory,cogEvents,genesisFolders]=await Promise.all([
    GET('/api/autonomous/log'),GET('/api/validation/verifications/recent'),
    GET('/governance/healing/history'),GET('/api/cognitive-events/recent'),
    GET('/api/genesis-daily/folders?days=30'),
  ]);
  // Normalize autonomous log
  (autoLog?.log||autoLog?.entries||[]).forEach(e=>{entries.push({ts:e.timestamp||e.ts||'',type:'operator_action',title:e.action||e.msg||e.message||'Loop event',detail:e.detail||JSON.stringify(e).slice(0,200),source:'ouroboros',color:evtColors.operator_action});});
  // Verifications
  (verifications?.verifications||verifications?.data||[]).forEach(e=>{const passed=e.passed||e.status==='passed';entries.push({ts:e.timestamp||e.created_at||'',type:passed?'verification_passed':'verification_failed',title:e.title||e.action||'Verification',detail:e.detail||e.result||'',source:'validation',color:evtColors[passed?'verification_passed':'verification_failed']});});
  // Healing history
  (healHistory?.history||healHistory?.data||[]).forEach(e=>{entries.push({ts:e.timestamp||e.ts||'',type:e.result==='success'?'heal_completed':'heal_failed',title:e.action||e.title||'Healing action',detail:e.detail||e.component||'',source:'governance',color:evtColors[e.result==='success'?'heal_completed':'heal_failed']});});
  // Cognitive events
  (cogEvents?.events||cogEvents?.data||[]).forEach(e=>{entries.push({ts:e.timestamp||e.ts||'',type:'cognitive_event',title:e.topic||e.title||'Cognitive event',detail:typeof e.data==='object'?JSON.stringify(e.data).slice(0,200):(e.data||''),source:'cognitive',color:evtColors.cognitive_event});});
  // Genesis daily folders
  (genesisFolders?.folders||[]).forEach(e=>{entries.push({ts:e.date+'T00:00:00Z',type:'genesis_record',title:`${e.label||e.date}: ${e.key_count} keys${e.error_count?' ('+e.error_count+' errors)':''}`,detail:`${e.key_count} genesis keys recorded`,source:'genesis',color:e.error_count>0?evtColors.genesis_record:'#2ecc71'});});
  // Local operator ledger
  S.localLedger.forEach(e=>{entries.push({ts:e.ts,type:e.type,title:e.title,detail:e.detail,source:'operator',outcome:e.outcome,color:evtColors[e.type]||evtColors.operator_action});});
  // Sort newest first
  entries.sort((a,b)=>(b.ts||'').localeCompare(a.ts||''));
  S.auditEntries=entries;S.auditLoading=false;
}

function renderAudit(p){
  let html=`<div class="sub-tabs">
    <button class="sub-tab${S.auditSubTab==='timeline'?' active':''}" onclick="S.auditSubTab='timeline';renderAudit(this.closest('.pane'))">📋 Timeline</button>
    <button class="sub-tab${S.auditSubTab==='live'?' active':''}" onclick="S.auditSubTab='live';renderAudit(this.closest('.pane'))">📡 Live Tail</button>

    </div>`;
    html+=`<div style="flex:1;overflow-y:auto">`;

    else if(S.auditEntries.length===0){html+=`<div class="empty">No audit entries yet. Fix a problem or run a test to start recording.</div>`;}
    else{
      S.auditEntries.slice(0,200).forEach(e=>{
        const time=e.ts?new Date(e.ts).toLocaleTimeString():'—';
        const outcomeHtml=e.outcome?`<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:${e.outcome==='completed'?'rgba(46,204,113,.15)':e.outcome==='failed'?'rgba(231,76,60,.15)':'rgba(100,100,100,.15)'};color:${e.outcome==='completed'?'#2ecc71':e.outcome==='failed'?'#e74c3c':'#aaa'};font-weight:700">${e.outcome}</span>`:'';
        html+=`<div class="timeline-entry">
          <div class="ts">${time}</div>
          <div class="dot-col"><div class="evt-dot" style="background:${e.color||'#636e72'}"></div></div>
          <div class="body">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
              <span class="evt-type" style="background:${(e.color||'#636e72')}20;color:${e.color||'#636e72'}">${(e.type||'event').replace(/_/g,' ')}</span>
              <span style="font-size:9px;color:var(--dim)">${e.source||''}</span>
              ${outcomeHtml}
            </div>
            <div style="font-size:11px;font-weight:600">${e.title||''}</div>
            ${e.detail?`<div style="font-size:10px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.detail}</div>`:''}
          </div>
        </div>`;
      });
    }
    html+=`</div>`;
  }

  if(S.auditSubTab==='live'){
    html+=`<div class="toolbar">
      <span style="font-size:12px;font-weight:700">📡 Live Tail</span>
      <div id="audit-live-dot" style="width:8px;height:8px;border-radius:50%;background:${S.auditLiveConnected?'var(--green)':'var(--red)'}"></div>
      <span style="font-size:10px;color:var(--muted)">${S.auditLiveConnected?'Connected':'Disconnected'}</span>
      <div style="flex:1"></div>
      <button class="btn-sm" style="background:var(--dim)" onclick="S.auditLiveLogs=[];renderAudit(this.closest('.pane'))">🗑 Clear</button>
    </div>`;
    html+=`<div id="audit-live-console" style="flex:1;overflow-y:auto;background:#000;padding:10px;font-family:'JetBrains Mono','Fira Code',monospace;font-size:11px;line-height:1.5;white-space:pre-wrap">`;
    if(S.auditLiveLogs.length===0){html+=`<span style="color:#636e72">Waiting for log events…</span>`;}
    else{S.auditLiveLogs.forEach(l=>{html+=`<div class="${logCls(l)}">${l}</div>`;});}
    html+=`</div>`;
  }

  p.innerHTML=html;
  if(S.auditSubTab==='live'){const c=document.getElementById('audit-live-console');if(c)c.scrollTop=c.scrollHeight;}
}

async function loadTestSuites(){S.testSuites=(await GET('/api/testing/discover'))?.suites||[];}
async function loadTestHistory(){S.testHistory=(await GET('/api/testing/history'))?.runs||(await GET('/api/testing/history'))?.data||[];}

async function runTest(suite,markers){
  const ledgerId=addLedger('test_run','pytest: '+(suite||'all'),markers||'').id;
  S.testStreamLines=[];S.testActiveRun={status:'running',suite};
  renderTesting(document.getElementById('pane-testing'));
  const r=await POST('/api/testing/run',{suite:suite||'',markers:markers||'',verbose:true});
  if(!r||!r.task_id){S.testActiveRun={status:'failed',suite};updateLedger(ledgerId,'failed','No task_id');renderTesting(document.getElementById('pane-testing'));return;}
  const taskId=r.task_id;
  // SSE stream
  const evtSrc=new EventSource(API+'/api/testing/stream/'+taskId);
  evtSrc.onmessage=(e)=>{
    S.testStreamLines.push(e.data);
    if(S.testStreamLines.length>2000)S.testStreamLines=S.testStreamLines.slice(-2000);
    const con=document.getElementById('test-console');
    if(con){con.textContent=S.testStreamLines.join('\n');con.scrollTop=con.scrollHeight;}
  };
  evtSrc.onerror=()=>{
    evtSrc.close();
    S.testActiveRun={status:'completed',suite};
    updateLedger(ledgerId,'completed','Finished');
    loadTestHistory();
    renderTesting(document.getElementById('pane-testing'));
  };
}

function renderBootLog(p){
  p.innerHTML='';
  const w=document.createElement('div');w.style.cssText='flex:1;overflow:auto;padding:12px;background:#000;font-family:monospace;font-size:11px;line-height:1.5';
  if(S.bootLogs.length===0)w.innerHTML='<div style="color:#636e72">Waiting for boot log…</div>';
  else S.bootLogs.forEach(l=>{const d=document.createElement('div');d.className=logCls(l);d.textContent=l;w.appendChild(d);});
  p.appendChild(w);w.scrollTop=w.scrollHeight;
}
function logCls(l){if(!l)return'log-d';if(l.includes('[ERROR]')||l.includes('Exception'))return'log-e';if(l.includes('WARN'))return'log-w';if(l.includes('[OK]')||l.includes('SUCCESS'))return'log-ok';if(l.includes('API')||l.includes('HTTP'))return'log-i';return'log-d';}

function renderMetrics(p){
  const sys=S.health.system?.resources||{};
  const m=[{l:'CPU',v:(sys.cpu_total||0).toFixed(1)+'%',c:(sys.cpu_total||0)>85?'#e74c3c':'#2ecc71',pct:sys.cpu_total||0},{l:'Memory',v:(sys.memory_percent||0).toFixed(1)+'%',s:`${sys.memory_used_gb||0}/${sys.memory_total_gb||0}GB`,c:(sys.memory_percent||0)>85?'#e74c3c':'#2ecc71',pct:sys.memory_percent||0},{l:'Disk',v:(sys.disk_percent||0).toFixed(1)+'%',s:`${sys.disk_used_gb||0}/${sys.disk_total_gb||0}GB`,c:(sys.disk_percent||0)>85?'#e74c3c':'#2ecc71',pct:sys.disk_percent||0},{l:'Cores',v:sys.cpu_cores||0,c:'#3498db'}];

function renderNetwork(p){
  const svcs=[{n:'Grace API',u:'localhost:8000',k:'grace_api'},{n:'PostgreSQL',u:'localhost:5432',k:'database'},{n:'Qdrant',u:'cloud.qdrant.io',k:'qdrant'},{n:'Ollama',u:'localhost:11434',k:'ollama'},{n:'Frontend',u:'localhost:5173',k:'frontend'},{n:'Ops Console',u:'localhost:9000',k:'frontend'}];
  let html=`<div style="padding:20px;overflow:auto;flex:1"><div style="font-size:16px;font-weight:700;margin-bottom:16px">Network Services</div>${svcs.map(s=>{const on=s.k==='frontend'&&s.u.includes('9000')?true:S.health[s.k];return`<div class="card" style="display:flex;align-items:center;gap:14px;padding:12px;margin-bottom:6px"><div class="dot" style="background:${on?'#2ecc71':'#e74c3c'}"></div><span style="font-size:12px;font-weight:700;width:120px">${s.n}</span><span class="mono" style="font-size:11px;color:var(--muted)">${s.u}</span><div style="flex:1"></div><span style="font-size:10px;font-weight:700;color:${on?'#2ecc71':'#e74c3c'}">${on?'CONNECTED':'UNREACHABLE'}</span></div>`;}).join('')}`;

  // Monitoring Organs as service-level view
  const org=S.organs;
  if(org){
    const list=org.organs||org.data||org;
    const entries=Array.isArray(list)?list:typeof list==='object'?Object.entries(list).map(([k,v])=>({name:k,...(typeof v==='object'?v:{status:v})})):[];
    if(entries.length>0){
      html+=`<div style="font-size:14px;font-weight:700;margin-top:24px;margin-bottom:10px">🫀 Internal Subsystems</div>`;
      entries.forEach(o=>{
        const name=o.name||o.organ||o.id||'?';
        const st=o.status||o.state||'unknown';
        const on=st==='healthy'||st==='active'||st==='live';
        const latency=o.latency_ms||o.response_time;
        html+=`<div class="card" style="display:flex;align-items:center;gap:14px;padding:12px;margin-bottom:6px"><div class="dot" style="background:${on?'#2ecc71':'#e74c3c'}"></div><span style="font-size:12px;font-weight:700;width:140px">${name.replace(/_/g,' ')}</span><span style="font-size:10px;font-weight:700;color:${on?'#2ecc71':'#e74c3c'}">${st.toUpperCase()}</span>${latency?`<span style="font-size:9px;color:var(--muted);margin-left:auto">${latency}ms</span>`:''}</div>`;
      });
    }
  }

  html+=`</div>`;
  p.innerHTML=html;
}

function renderGenesis(p){
  p.innerHTML=`<div style="padding:20px;overflow:auto;flex:1"><div style="font-size:16px;font-weight:700;margin-bottom:16px">Genesis Keys</div><div id="gen-summary" class="card-grid" style="margin-bottom:16px"><div class="empty">Loading stats…</div></div><div id="gen-list"><div class="empty">Loading folders…</div></div></div>`;
  GET('/api/genesis-daily/stats').then(d=>{const g=document.getElementById('gen-summary');if(!g)return;const total=d?.total_keys||0;const today=d?.today_keys||0;g.innerHTML=[{l:'🔑 Total Keys',v:total,c:'var(--blue)'},{l:'📅 Today',v:today,c:'var(--green)'}].map(c=>`<div class="card"><div style="font-size:9px;color:var(--muted);margin-bottom:4px">${c.l}</div><div style="font-size:22px;font-weight:800;color:${c.c}">${c.v}</div></div>`).join('');});
  GET('/api/genesis-daily/folders?days=30').then(d=>{const l=document.getElementById('gen-list');if(!l)return;const folders=d?.folders||[];if(!folders.length){l.innerHTML='<div class="empty">No genesis folders</div>';return;}l.innerHTML=folders.map(f=>{const c=f.error_count>0?'#e74c3c':'#2ecc71';return`<div class="card" style="margin-bottom:5px;padding:10px 12px;border-left:3px solid ${c};cursor:pointer"><div style="display:flex;align-items:center;justify-content:space-between"><div style="font-size:12px;font-weight:700">${f.label||f.date}</div><div style="display:flex;gap:8px;align-items:center"><span style="font-size:10px;color:var(--blue);font-weight:600">🔑 ${f.key_count} keys</span>${f.error_count?`<span style="font-size:10px;color:var(--red);font-weight:600">❌ ${f.error_count} errors</span>`:''}</div></div></div>`;}).join('');});
}

function renderFederated(p){
  p.innerHTML=`<div style="padding:20px;overflow:auto;flex:1"><div style="font-size:16px;font-weight:700;margin-bottom:16px">Federated Learning</div><div class="card-grid" id="fed-grid"><div class="empty">Loading…</div></div><div id="fed-oracle" style="margin-top:20px"></div></div>`;
  GET('/api/oracle/dashboard').then(d=>{
    const g=document.getElementById('fed-grid');if(!g)return;
    const f=d?.federated||{};
    g.innerHTML=`<div class="card"><div style="font-size:9px;color:var(--muted);margin-bottom:4px">🌍 Status</div><div style="font-size:16px;font-weight:800;color:${f.status==='active'?'#2ecc71':'var(--muted)'}">${(f.status||'unavailable').toUpperCase()}</div></div><div class="card"><div style="font-size:9px;color:var(--muted);margin-bottom:4px">🖥️ Nodes</div><div style="font-size:22px;font-weight:800;color:var(--blue)">${f.nodes||0}</div></div><div class="card"><div style="font-size:9px;color:var(--muted);margin-bottom:4px">🔄 Rounds</div><div style="font-size:22px;font-weight:800;color:var(--purple)">${f.rounds||0}</div></div>${f.global_model_version?`<div class="card"><div style="font-size:9px;color:var(--muted);margin-bottom:4px">📦 Model Version</div><div style="font-size:22px;font-weight:800;color:var(--green)">${f.global_model_version}</div></div>`:''}`;
    // Oracle learning stats
    const o=document.getElementById('fed-oracle');if(!o||!d)return;
    let html=`<div style="font-size:14px;font-weight:700;margin-bottom:10px">🧠 Oracle Learning Stats</div><div class="card-grid">`;
    const ex=d.learning_examples||{};const pat=d.learning_patterns||{};const proc=d.procedures||{};const ep=d.episodes||{};
    [{l:'📚 Examples',v:ex.total||0,s:ex.avg_trust?`${(ex.avg_trust*100).toFixed(0)}% trust`:''},{l:'📐 Patterns',v:pat.total||0,s:pat.avg_success_rate?`${(pat.avg_success_rate*100).toFixed(0)}% success`:''},{l:'🎯 Procedures',v:proc.total||0,s:proc.avg_success_rate?`${(proc.avg_success_rate*100).toFixed(0)}% success`:''},{l:'📖 Episodes',v:ep.total||0}].forEach(c=>{
      html+=`<div class="card"><div style="font-size:9px;color:var(--muted);margin-bottom:4px">${c.l}</div><div style="font-size:22px;font-weight:800;color:var(--blue)">${c.v}</div>${c.s?`<div style="font-size:9px;color:var(--dim);margin-top:3px">${c.s}</div>`:''}</div>`;
    });
    html+=`</div>`;
    o.innerHTML=html;
  });
}

async function pollHealth(){
  const svc={};
  try{const r=await fetch(API+'/health');svc.grace_api=r.ok;S.graceRunning=r.ok;}catch{svc.grace_api=false;S.graceRunning=false;}
  try{const r=await fetch(API+'/api/system-health/dashboard');if(r.ok){const d=await r.json();svc.system=d;svc.database=d.services?.database?.status==='live';svc.qdrant=d.services?.qdrant?.status==='live';svc.ollama=d.services?.ollama?.status==='live'||d.services?.ollama?.status==='configured';svc.frontend=true;}}catch{}
  S.health=svc;renderSidebar();
}
async function pollLiveData(){
  const [spindle,ouro,compMap,mirror,bi,kpi,organs]=await Promise.all([
    GET('/api/spindle/dashboard'),GET('/api/autonomous/status'),
    GET('/api/component-health/map'),GET('/telemetry/mirror/latest'),
    GET('/api/bi/dashboard'),GET('/kpi/health'),GET('/monitoring/organs'),
  ]);
  if(spindle)S.spindleData=spindle;
  if(ouro)S.ouroboros=ouro;
  if(compMap)S.componentMap=compMap;
  if(mirror)S.mirrorSnapshot=mirror;
  if(bi)S.biData=bi;
  if(kpi)S.kpiData=kpi;
  if(organs)S.organs=organs;
  if(S.activeTab)renderTab();
}

function connectBootWs(){
  let d=1000;const c=()=>{const ws=new WebSocket(WS_BASE+'/api/autonomous/logs/stream');ws.onmessage=e=>{S.bootLogs.push(e.data);if(S.bootLogs.length>1000)S.bootLogs=S.bootLogs.slice(-1000);if(S.activeTab==='bootlog')renderBootLog(document.getElementById('pane-bootlog'));};ws.onopen=()=>{d=1000;};ws.onclose=()=>{d=Math.min(d*2,30000);setTimeout(c,d);};ws.onerror=()=>ws.close();};c();
}
function connectFeedWs(){
  let d=1000;const c=()=>{const ws=new WebSocket(WS_BASE+'/api/autonomous/logs/stream');ws.onmessage=e=>{S.feedLogs.push(e.data);if(S.feedLogs.length>500)S.feedLogs=S.feedLogs.slice(-500);if(S.bottomExpanded&&S.bottomTab==='feed')renderBottom();};ws.onopen=()=>{d=1000;};ws.onclose=()=>{d=Math.min(d*2,30000);setTimeout(c,d);};ws.onerror=()=>ws.close();};c();
}
function connectProblemsWs(){
  let d=1000;const c=()=>{const ws=new WebSocket(WS_BASE+'/api/problems/ws');ws.onmessage=()=>{setTimeout(loadProblems,500);};ws.onopen=()=>{d=1000;};ws.onclose=()=>{d=Math.min(d*2,30000);setTimeout(c,d);};ws.onerror=()=>ws.close();};c();
}

// ══════════════════════════════════════════════════════════════
// BOTTOM BAR
// ══════════════════════════════════════════════════════════════
function setupBottom(){
  document.getElementById('bottom-toggle').onclick=()=>{
    S.bottomExpanded=!S.bottomExpanded;
    document.getElementById('bottom-bar').style.height=S.bottomExpanded?'240px':'32px';
    document.getElementById('bottom-toggle').textContent=S.bottomExpanded?'▼':'▲';
    renderBottom();
  };
  document.querySelectorAll('.bt-btn').forEach(b=>{b.onclick=()=>{
    S.bottomTab=b.dataset.bt;document.querySelectorAll('.bt-btn').forEach(x=>x.classList.toggle('active',x.dataset.bt===S.bottomTab));
    if(!S.bottomExpanded){S.bottomExpanded=true;document.getElementById('bottom-bar').style.height='240px';document.getElementById('bottom-toggle').textContent='▼';}
    renderBottom();
  };});
  document.getElementById('bottom-send').onclick=sendBottom;
  document.getElementById('bottom-input').onkeydown=e=>{if(e.key==='Enter')sendBottom();};
}
function renderBottom(){
  if(!S.bottomExpanded)return;
  const con=document.getElementById('bottom-content'),ir=document.getElementById('bottom-input-row'),pr=document.getElementById('bottom-prompt');
  if(S.bottomTab==='feed'){ir.classList.remove('show');con.innerHTML='';S.feedLogs.forEach(l=>{const d=document.createElement('div');d.className=logCls(l);d.textContent=l;con.appendChild(d);});con.scrollTop=con.scrollHeight;}
  else{ir.classList.add('show');pr.textContent=S.bottomTab==='shell'?'>_':'💬';document.getElementById('bottom-input').placeholder=S.bottomTab==='shell'?'Enter command…':'Talk to Grace…';con.innerHTML='';S.bottomMessages.forEach(m=>{const c=m.role==='user'?'#3498db':m.role==='assistant'?'#2ecc71':'#f1c40f';const l=m.role==='user'?(S.bottomTab==='shell'?'$ ':'You: '):'Grace: ';con.innerHTML+=`<div style="margin-bottom:4px"><span style="color:${c};font-weight:700">${l}</span><span>${m.text}</span></div>`;});con.scrollTop=con.scrollHeight;}
}
async function sendBottom(){
  const inp=document.getElementById('bottom-input'),cmd=inp.value.trim();if(!cmd)return;inp.value='';
  S.bottomMessages.push({role:'user',text:cmd});renderBottom();
  try{let r;if(S.bottomTab==='shell'){r=await POST('/brain/system',{action:'execute',payload:{command:cmd}});S.bottomMessages.push({role:'system',text:r?.ok?(r.data?.output||r.data?.message||JSON.stringify(r.data)):`Error: ${r?.error||'unknown'}`});}else{r=await POST('/brain/chat',{action:'send',payload:{message:cmd}});S.bottomMessages.push({role:'assistant',text:r?.ok?(typeof r.data==='string'?r.data:r.data?.response||r.data?.message||JSON.stringify(r.data)):`Error: ${r?.error||'unknown'}`});}}catch(e){S.bottomMessages.push({role:'system',text:'Error: '+e.message});}
  renderBottom();
}

function connectSpindleWs(){
  let d=1000;const c=()=>{const ws=new WebSocket(WS_BASE+'/api/spindle/ws');ws.onmessage=e=>{try{const msg=JSON.parse(e.data);S.spindleEvents.unshift(msg);if(S.spindleEvents.length>200)S.spindleEvents=S.spindleEvents.slice(0,200);}catch{}};ws.onopen=()=>{d=1000;};ws.onclose=()=>{d=Math.min(d*2,30000);setTimeout(c,d);};ws.onerror=()=>ws.close();};c();
}
function connectAuditLiveWs(){
  let d=1000;const c=()=>{const ws=new WebSocket(WS_BASE+'/api/autonomous/logs/stream');ws.onmessage=e=>{S.auditLiveLogs.push(e.data);if(S.auditLiveLogs.length>1000)S.auditLiveLogs=S.auditLiveLogs.slice(-1000);if(S.activeTab==='audit'&&S.auditSubTab==='live'){const con=document.getElementById('audit-live-console');if(con){const div=document.createElement('div');div.className=logCls(e.data);div.textContent=e.data;con.appendChild(div);con.scrollTop=con.scrollHeight;}}};ws.onopen=()=>{d=1000;S.auditLiveConnected=true;const dot=document.getElementById('audit-live-dot');if(dot)dot.style.background='var(--green)';};ws.onclose=()=>{S.auditLiveConnected=false;d=Math.min(d*2,30000);setTimeout(c,d);};ws.onerror=()=>ws.close();};c();
}
