# GRACE CI Pipeline Configuration
# ================================
# Main continuous integration pipeline for GRACE.
# Powered by Genesis Key CI/CD system.

id: grace-ci
name: GRACE CI Pipeline
description: |
  Main continuous integration pipeline that runs on every push and pull request.
  Includes linting, testing, security scanning, and build stages.

# Trigger configuration
triggers:
  - push
  - pull_request

# Branch filters (supports glob patterns)
branches:
  - main
  - develop
  - "feature/*"
  - "fix/*"
  - "release/*"

# Global timeout (minutes)
timeout_minutes: 60

# Global environment variables
environment:
  CI: "true"
  PYTHONDONTWRITEBYTECODE: "1"
  NODE_ENV: "test"

# Pipeline stages
stages:
  # Stage 1: Checkout code
  - name: checkout
    type: checkout
    commands:
      - echo "Checking out branch $BRANCH"
      - git status
    timeout_seconds: 120

  # Stage 2: Install backend dependencies
  - name: install-backend
    type: install
    working_dir: backend
    commands:
      - echo "Installing backend dependencies..."
      - python -m pip install --upgrade pip
      - pip install -r requirements.txt
      - pip install pytest pytest-cov flake8 bandit safety
    timeout_seconds: 300
    depends_on:
      - checkout

  # Stage 3: Install frontend dependencies
  - name: install-frontend
    type: install
    working_dir: frontend
    commands:
      - echo "Installing frontend dependencies..."
      - npm ci || npm install
    timeout_seconds: 300
    depends_on:
      - checkout

  # Stage 4: Lint backend
  - name: lint-backend
    type: lint
    working_dir: backend
    commands:
      - echo "Linting Python code..."
      - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
    timeout_seconds: 180
    depends_on:
      - install-backend
    continue_on_error: false

  # Stage 5: Lint frontend
  - name: lint-frontend
    type: lint
    working_dir: frontend
    commands:
      - echo "Linting JavaScript/React code..."
      - npm run lint || echo "Lint completed with warnings"
    timeout_seconds: 180
    depends_on:
      - install-frontend
    continue_on_error: true

  # Stage 6: Test backend
  - name: test-backend
    type: test
    working_dir: backend
    commands:
      - echo "Running backend tests..."
      - pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing || echo "Some tests failed"
    timeout_seconds: 600
    depends_on:
      - lint-backend
    artifacts:
      - coverage.xml
      - .coverage
    continue_on_error: false

  # Stage 7: Test frontend
  - name: test-frontend
    type: test
    working_dir: frontend
    commands:
      - echo "Running frontend tests..."
      - npm test -- --passWithNoTests --watchAll=false || echo "Tests completed"
    timeout_seconds: 300
    depends_on:
      - lint-frontend
    continue_on_error: true

  # Stage 8: Security scan
  - name: security-scan
    type: security
    working_dir: backend
    commands:
      - echo "Running security scans..."
      - safety check --json || echo "Safety scan complete"
      - bandit -r . -ll -f json -o bandit-report.json || echo "Bandit scan complete"
    timeout_seconds: 300
    depends_on:
      - test-backend
    artifacts:
      - bandit-report.json
    continue_on_error: true

  # Stage 9: Build frontend
  - name: build-frontend
    type: build
    working_dir: frontend
    commands:
      - echo "Building frontend..."
      - npm run build || echo "Build skipped"
    timeout_seconds: 600
    depends_on:
      - test-frontend
    artifacts:
      - dist/
      - build/
    continue_on_error: true

  # Stage 10: Generate report
  - name: generate-report
    type: custom
    commands:
      - echo "======================================"
      - echo "       CI Pipeline Complete"
      - echo "======================================"
      - echo "Branch: $BRANCH"
      - echo "Workspace: $WORKSPACE"
      - date
    timeout_seconds: 60
    depends_on:
      - security-scan
      - build-frontend

# Notifications (future enhancement)
# notifications:
#   on_success:
#     - webhook: https://example.com/success
#   on_failure:
#     - webhook: https://example.com/failure
