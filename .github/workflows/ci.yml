name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 mypy

      - name: Lint with flake8
        run: |
          cd backend
          # Stop build on syntax errors only (E9=syntax, F63=invalid, F7=undefined, F82=undefined name)
          flake8 . --count --select=E9,F63,F7,F82 --ignore=F824 --show-source --statistics --exclude=__pycache__,venv,.venv,node_modules,training_corpus,knowledge_base
          # Exit-zero treats all other errors as warnings
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=150 --statistics --exclude=__pycache__,venv,.venv,node_modules,training_corpus,knowledge_base

      - name: Run backend tests
        env:
          SKIP_EMBEDDING_LOAD: "true"
          SKIP_QDRANT_CHECK: "true"
          SKIP_OLLAMA_CHECK: "true"
          SKIP_AUTO_INGESTION: "true"
          DISABLE_CONTINUOUS_LEARNING: "true"
          SKIP_LLM_CHECK: "true"
          LIGHTWEIGHT_MODE: "true"
        run: |
          cd backend
          python -m pytest tests/test_grace_system.py tests/unit/ tests/reliability/ tests/security/ -v --tb=short --ignore=tests/integration

      - name: Type checking with mypy
        continue-on-error: true
        run: |
          cd backend
          mypy --ignore-missing-imports --no-error-summary app.py

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  vscode-extension-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install extension dependencies
        run: |
          cd grace-os-vscode
          npm install

      - name: Compile extension
        run: |
          cd grace-os-vscode
          npm run compile

  mcp-servers-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build MCP memory server
        run: |
          cd backend/mcp_repos/mcp-servers/src/memory
          npm install
          npm run build

      - name: Build MCP filesystem server
        run: |
          cd backend/mcp_repos/mcp-servers/src/filesystem
          npm install
          npm run build

      - name: Build MCP sequential-thinking server
        run: |
          cd backend/mcp_repos/mcp-servers/src/sequentialthinking
          npm install
          npm run build

  docker-build-backend:
    runs-on: ubuntu-latest
    needs: [lint-and-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: grace-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-frontend:
    runs-on: ubuntu-latest
    needs: [lint-and-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: grace-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
