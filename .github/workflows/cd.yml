name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.inputs.environment == 'staging' || startsWith(github.ref, 'refs/tags/v')
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Determine image tag
        id: image-tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Update deployment image tags
        run: |
          kubectl set image deployment/grace-backend \
            backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ steps.image-tag.outputs.tag }} \
            -n grace
          kubectl set image deployment/grace-frontend \
            frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.image-tag.outputs.tag }} \
            -n grace

      - name: Apply k8s manifests
        run: |
          kubectl apply -f k8s/deployment.yaml -n grace
          kubectl apply -f k8s/services.yaml -n grace

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/grace-backend -n grace --timeout=300s
          kubectl rollout status deployment/grace-frontend -n grace --timeout=300s

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: github.event.inputs.environment == 'production'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Determine image tag
        id: image-tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Record current revision for rollback
        id: rollback-info
        run: |
          BACKEND_REV=$(kubectl rollout history deployment/grace-backend -n grace --revision=0 2>/dev/null | tail -1 || echo "none")
          echo "backend_rev=${BACKEND_REV}" >> "$GITHUB_OUTPUT"

      - name: Update deployment image tags
        run: |
          kubectl set image deployment/grace-backend \
            backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ steps.image-tag.outputs.tag }} \
            -n grace
          kubectl set image deployment/grace-frontend \
            frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.image-tag.outputs.tag }} \
            -n grace

      - name: Apply k8s manifests
        run: |
          kubectl apply -f k8s/deployment.yaml -n grace
          kubectl apply -f k8s/services.yaml -n grace

      - name: Wait for rollout
        id: rollout
        run: |
          kubectl rollout status deployment/grace-backend -n grace --timeout=300s
          kubectl rollout status deployment/grace-frontend -n grace --timeout=300s

      - name: Smoke test
        id: smoke-test
        run: |
          BACKEND_IP=$(kubectl get svc grace-backend-service -n grace -o jsonpath='{.spec.clusterIP}')
          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            STATUS=$(kubectl run smoke-test-${{ github.run_id }}-${i} --rm -i --restart=Never \
              --image=curlimages/curl:latest -n grace -- \
              curl -s -o /dev/null -w "%{http_code}" http://${BACKEND_IP}:8000/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed"
              exit 0
            fi
            echo "Attempt ${i}/${RETRIES}: got status ${STATUS}, retrying in 10s..."
            sleep 10
          done
          echo "Smoke test failed after ${RETRIES} attempts"
          exit 1

      - name: Rollback on failure
        if: failure() && (steps.rollout.outcome == 'failure' || steps.smoke-test.outcome == 'failure')
        run: |
          echo "Deployment failed — rolling back..."
          kubectl rollout undo deployment/grace-backend -n grace
          kubectl rollout undo deployment/grace-frontend -n grace
          kubectl rollout status deployment/grace-backend -n grace --timeout=300s
          kubectl rollout status deployment/grace-frontend -n grace --timeout=300s
          echo "Rollback complete"
