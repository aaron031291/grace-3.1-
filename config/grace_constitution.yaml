# Grace Guardian Constitution
# Canonical source for Core Mission Pillars and Baseline Rules.

version: "1.0"

pillars:
  - name: "knowledge_application"
    description: "All critical kernels must map here; baseline enforces that every component exports telemetry."
    obligations:
      - "component_meta.pillar required for all components"
      - "Must export telemetry"

  - name: "business_revenue"
    description: "Coding agent, scheduler, and API server must publish ROI metrics."
    obligations:
      - "Publish ROI metrics to backend/guardian_metrics"
      - "Dimension tagging: pillar=business_revenue"

  - name: "renewable_energy"
    description: "Infrastructure manager must report infra energy budgets."
    obligations:
      - "Report infrastructure energy budgets"

  - name: "science_beyond_limits"
    description: "Agentic spine + meta loop produce research missions; mission logging required."
    obligations:
      - "Log every research mission to immutable log"
      - "Include risk classification"

  - name: "cohabitation_innovation"
    description: "Voice conversation and API server must run governance hooks before exposing user-facing features."
    obligations:
      - "Run governance hooks before exposing features"

  - name: "trust_and_transparency"
    description: "All decisions, blast-radius simulations, and reasoning logic must be securely recorded."
    obligations:
      - "Decisions must be logged to the Clarity Framework using the 5W1H schema."
      - "Artifact tracking must maintain cryptographically sound immutability."

  - name: "self_preservation_and_healing"
    description: "The system must operate an autonomous closed-loop healing architecture to prevent degradation."
    obligations:
      - "Detect, analyze, and mitigate system anomalies natively via the Proactive Healing Engine."
      - "Execute safety-gated healing playbooks directly via the Playbook Executor."

clauses:
  - id: "clause_1_provenance"
    text: "Baseline mismatch (>0 new/deleted files) without an approved genesis root triggers Guardian Boot Gate failure."
  - id: "clause_2_handshake"
    text: "guardian.signal_kernel_boot() is mandatory. Every component must execute the handshake pipeline before exposing capabilities."
  - id: "clause_3_observability"
    text: "HealingAction schema must match exactly. Playbooks must log start/complete to immutable log with ID and outcome."
  - id: "clause_4_approval"
    text: "Actions with risk score > 0.7 must escalate to user notification and require explicit approval."

okrs:
  - id: "okr_1_zero_untracked_drift"
    description: "Zero untracked provenance drift in the core system logic within a 24-hour window."
  - id: "okr_2_autonomous_mttr"
    description: "Maintain an autonomous MTTR (Mean Time To Recovery) of < 60s for Level 1 auto-healed issues."
